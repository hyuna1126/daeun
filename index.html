<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 출석 체크 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .status-btn.active { ring: 4px; ring-offset: 2px; transform: scale(0.95); }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-3xl mx-auto">
        <!-- 헤더 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">출석 체크 시스템</h1>
            <p class="text-slate-500 mt-2" id="current-date"></p>
        </header>

        <!-- 입력 폼 카드 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">학생 이름</label>
                    <input type="text" id="studentName" placeholder="이름을 입력하세요" 
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">출결 상태 선택</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="setStatus('출석', this)" class="status-btn bg-emerald-50 text-emerald-700 border border-emerald-200 py-3 rounded-xl font-medium hover:bg-emerald-100 transition-all">출석</button>
                        <button onclick="setStatus('지각', this)" class="status-btn bg-amber-50 text-amber-700 border border-amber-200 py-3 rounded-xl font-medium hover:bg-amber-100 transition-all">지각</button>
                        <button onclick="setStatus('결석', this)" class="status-btn bg-rose-50 text-rose-700 border border-rose-200 py-3 rounded-xl font-medium hover:bg-rose-100 transition-all">결석</button>
                    </div>
                </div>

                <button onclick="submitAttendance()" 
                    class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:transform active:scale-[0.98] transition-all mt-4">
                    출석 정보 저장하기
                </button>
            </div>
        </div>

        <!-- 실시간 기록 리스트 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <h2 class="font-bold text-slate-800">오늘의 기록</h2>
                <span id="recordCount" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-full">0명</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3 font-medium">시간</th>
                            <th class="px-6 py-3 font-medium">이름</th>
                            <th class="px-6 py-3 font-medium text-center">상태</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList" class="divide-y divide-slate-100">
                        <!-- 데이터가 여기에 실시간으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="py-12 text-center text-slate-400 hidden">
                등록된 기록이 없습니다.
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } 
        from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- Firebase 설정 (본인의 정보로 교체하세요) ---
        const firebaseConfig = {
            apiKey: "AIzaSyC0FLnGnyR3YuWj-QU0DoS44Y9YjKyAG8w",
  authDomain: "test-b941a.firebaseapp.com",
  projectId: "test-b941a",
  storageBucket: "test-b941a.firebasestorage.app",
  messagingSenderId: "473724150504",
  appId: "1:473724150504:web:3f598a09453d2c63589f5d"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceCol = collection(db, "attendance");

        // 상태값 관리
        let selectedStatus = '';

        // 날짜 표시
        const now = new Date();
        document.getElementById('current-date').innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 출결 리스트`;

        // 상태 선택 함수
        window.setStatus = (status, btn) => {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(b => {
                b.classList.remove('ring-2', 'ring-indigo-500', 'border-indigo-500', 'scale-95', 'shadow-inner');
            });
            btn.classList.add('ring-2', 'ring-indigo-500', 'border-indigo-500', 'scale-95', 'shadow-inner');
        };

        // 데이터 전송 함수
        window.submitAttendance = async () => {
            const nameInput = document.getElementById('studentName');
            const name = nameInput.value.trim();

            if (!name) { alert('학생 이름을 입력해주세요.'); return; }
            if (!selectedStatus) { alert('상태를 선택해주세요.'); return; }

            try {
                await addDoc(attendanceCol, {
                    name: name,
                    status: selectedStatus,
                    timestamp: serverTimestamp()
                });
                
                // 초기화
                nameInput.value = '';
                selectedStatus = '';
                document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('ring-2', 'ring-indigo-500', 'border-indigo-500', 'scale-95'));
                alert('기록되었습니다!');
            } catch (e) {
                console.error("Error adding document: ", e);
                alert('저장에 실패했습니다. Firebase 설정을 확인하세요.');
            }
        };

        // 실시간 데이터 감시 (Real-time Listener)
        const q = query(attendanceCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listElement = document.getElementById('attendanceList');
            const emptyState = document.getElementById('emptyState');
            const recordCount = document.getElementById('recordCount');
            
            listElement.innerHTML = '';
            recordCount.innerText = `${snapshot.size}명`;

            if (snapshot.empty) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();
                    const timeStr = date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                    
                    let statusColor = "";
                    if(data.status === '출석') statusColor = "bg-emerald-100 text-emerald-700";
                    else if(data.status === '지각') statusColor = "bg-amber-100 text-amber-700";
                    else statusColor = "bg-rose-100 text-rose-700";

                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 text-sm text-slate-500">${timeStr}</td>
                            <td class="px-6 py-4 font-medium text-slate-800">${data.name}</td>
                            <td class="px-6 py-4 text-center">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${statusColor}">
                                    ${data.status}
                                </span>
                            </td>
                        </tr>
                    `;
                    listElement.innerHTML += row;
                });
            }
        });
    </script>
</body>
</html>
